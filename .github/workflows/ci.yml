name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── 1. Auto-detect languages and versions from skaffold.yaml ───────────────
  detect:
    name: Detect Contexts
    runs-on: ubuntu-latest
    outputs:
      pipeline-context: ${{ steps.detect.outputs.pipeline-context }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect Contexts
        id: detect
        uses: octopilot/actions/detect-contexts@main

  # ── 2. Lint (pre-commit, language-aware) ───────────────────────────────────
  lint:
    needs: detect
    if: toJSON(fromJson(needs.detect.outputs.pipeline-context).languages) != '[]'
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: octopilot/actions/lint@main
        with:
          pipeline-context: ${{ needs.detect.outputs.pipeline-context }}

  # ── 3. Test (matrix per detected language context) ─────────────────────────
  # fail-fast: false so one failing context (e.g. Rust) does not cancel others
  # (Java, Helm). Integration runs only when all test matrix jobs pass.
  test:
    needs: detect
    if: toJSON(fromJson(needs.detect.outputs.pipeline-context).matrix) != '[]'
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.pipeline-context).matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: octopilot/actions/test@main
        with:
          pipeline-context: ${{ toJson(matrix) }}

  # ── 4a. Integration validate (build, smoke, generate UUID; skaffold + detect) ─
  integration-validate:
    name: Integration (validate)
    needs: [detect, lint, test]
    runs-on: ubuntu-latest
    outputs:
      uuid: ${{ steps.validate.outputs.uuid }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate primary build and generate UUID
        id: validate
        uses: octopilot/actions/integration-validate@main
        with:
          pipeline-context: ${{ needs.detect.outputs.pipeline-context }}
          smoke-binary-path: target/release/cronjob-log-monitor
          smoke-expect-pattern: MONITOR_LABEL_SELECTOR

  # ── 4b. Integration artifacts (matrix from skaffold + chart_paths) ──────────
  # Matrix is derived from detect: skaffold build.artifacts (docker if Dockerfile in context, else pack) and chart_paths.
  # Use the runner's Docker socket (ubuntu-latest has Docker). DinD causes "connection reset by peer" when Pack/op
  # use DOCKER_HOST to talk to DinD; the host daemon is reliable for both Pack (image) and chart builds.
  integration-artifacts:
    name: Integration (${{ matrix.suffix || matrix.output_key }})
    needs: [detect, integration-validate]
    if: toJSON(fromJson(needs.detect.outputs.pipeline-context).integration_matrix) != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.pipeline-context).integration_matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Build and push artifact
        id: build
        uses: octopilot/actions/integration-build-artifact@main
        with:
          artifact: ${{ toJson(matrix) }}
          ttl-uuid: ${{ needs.integration-validate.outputs.uuid }}
          op_version: v1.0.17

      - name: Upload artifact outputs
        run: |
          mkdir -p artifact-out
          mv outputs.txt "artifact-out/${{ matrix.output_key }}.txt" 2>/dev/null || true
          # Include build_result.json when present (e.g. from octopilot action) for merge in deploy
          [ -f build_result.json ] && cp build_result.json artifact-out/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: integration-${{ matrix.output_key }}
          path: artifact-out
          retention-days: 1

  # ── 4c. Integration deploy (Kind + Helm + CronJob) ─────────────────────────
  integration-deploy:
    name: Integration (deploy)
    needs: integration-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact outputs
        uses: actions/download-artifact@v4
        with:
          pattern: integration-*
          path: artifact-outputs

      - name: Merge build_result.json from all integration jobs
        uses: octopilot/actions/merge-build-results@main
        with:
          directory: artifact-outputs
          output-path: build_result.json

      - name: Load artifact outputs
        id: artifacts
        run: |
          set -e
          # Standardize on merged build_result.json (op/skaffold output); select by imageName
          IMAGE_MONITOR="$(jq -r '.builds[] | select(.imageName | test("cronjob-log-monitor$")) | .tag' build_result.json 2>/dev/null | head -1)"
          IMAGE_CHART="$(jq -r '.builds[] | select(.imageName | test("-chart$")) | .tag' build_result.json 2>/dev/null | head -1)"
          IMAGE_CRONJOB="$(jq -r '.builds[] | select(.imageName | test("integration-cronjob$")) | .tag' build_result.json 2>/dev/null | head -1)"
          # Chart ref must be Helm OCI shape: registry/repo/chartname:version[@digest]. Normalize image-style ref if needed.
          CHART_NAME="$(grep -E '^name:' chart/chartTemplate/Chart.yaml 2>/dev/null | sed 's/^name:[[:space:]]*//;s/[[:space:]]*$//' || echo "cronjob-log-monitor-chart")"
          if ! echo "$IMAGE_CHART" | grep -qE "/${CHART_NAME}:"; then
            # Build may emit image-style ref (ttl.sh/uuid-chart:0.1.0@sha256:...); insert /chartname before :version.
            if echo "$IMAGE_CHART" | grep -qE -- '-chart:[^@]+'; then
              IMAGE_CHART="$(echo "$IMAGE_CHART" | sed "s|-chart:|-chart/${CHART_NAME}:|")"
              echo "Normalized chart ref to Helm OCI form: ${IMAGE_CHART}"
            else
              echo "::error::Chart ref missing chart name segment: expected .../${CHART_NAME}:version[@digest], got: ${IMAGE_CHART}"
              exit 1
            fi
          fi
          # OCI chart: use digest-only ref (oci://host/repo/chart@sha256:...) so Helm does not list tags (ttl.sh does not support tag listing).
          if echo "$IMAGE_CHART" | grep -q '@sha256:'; then
            CHART_REF="oci://$(echo "$IMAGE_CHART" | sed 's/:[^@]*@/@/')"
          else
            CHART_REF="oci://${IMAGE_CHART}"
          fi
          echo "monitor_image=${IMAGE_MONITOR}" >> "$GITHUB_OUTPUT"
          echo "cronjob_image=${IMAGE_CRONJOB}" >> "$GITHUB_OUTPUT"
          echo "chart_ref=${CHART_REF}" >> "$GITHUB_OUTPUT"
          echo "=== build_result.json (merged) ==="
          cat build_result.json | jq .
          echo "=== Resolved deploy outputs ==="
          echo "monitor_image=${IMAGE_MONITOR}"
          echo "cronjob_image=${IMAGE_CRONJOB}"
          echo "chart_ref=${CHART_REF}"
          echo "chart_image=${IMAGE_CHART}"
          if [ -z "$IMAGE_MONITOR" ] || [ -z "$IMAGE_CRONJOB" ] || [ -z "$IMAGE_CHART" ]; then
            echo "::error::Missing builds in build_result.json: monitor=${IMAGE_MONITOR:+set} cronjob=${IMAGE_CRONJOB:+set} chart=${IMAGE_CHART:+set}"
            jq -r '.builds[]? | "\(.imageName): \(.tag)"' build_result.json 2>/dev/null || true
            exit 1
          fi

      - name: Create Kind cluster (Kubernetes 1.34.3)
        uses: helm/kind-action@v1
        with:
          version: v0.31.0
          node_image: kindest/node:v1.34.3
          cluster_name: cronjob-log-monitor
          wait: 120s

      - name: Setup kubectl
        uses: octopilot/actions/setup-tools@main
        with:
          kubectl_version: "1.34.3"

      - name: Setup Flux in Kind
        uses: octopilot/actions/setup-flux@main
        with:
          export_path: k8s/deployment/flux-system/gotk-components.yaml

      - name: Deploy cronjob-log-monitor via Flux (OCI chart + HelmRelease)
        env:
          CHART_REF: ${{ steps.artifacts.outputs.chart_ref }}
          MONITOR_IMAGE: ${{ steps.artifacts.outputs.monitor_image }}
        run: |
          set -e
          RECONCILE_FAILED=0
          # Derive OCI URL and digest from chart_ref (oci://host/repo@sha256:...)
          CHART_OCI_URL="$(echo "$CHART_REF" | sed 's|^oci://||' | cut -d'@' -f1)"
          CHART_DIGEST="$(echo "$CHART_REF" | sed 's|^oci://||' | cut -d'@' -f2)"
          CHART_REF_TYPE=digest
          CHART_REF_VALUE="$CHART_DIGEST"
          export CHART_OCI_URL CHART_REF_TYPE CHART_REF_VALUE MONITOR_IMAGE
          kubectl kustomize k8s/env/ci | envsubst | kubectl apply -f -
          flux reconcile source oci cronjob-log-monitor-chart -n cronjob-log-monitor --timeout=2m || RECONCILE_FAILED=1
          flux reconcile helmrelease cronjob-log-monitor -n cronjob-log-monitor --timeout=3m || RECONCILE_FAILED=1
          kubectl get all -n cronjob-log-monitor
          flux get helmrelease -n cronjob-log-monitor
          if [ "$RECONCILE_FAILED" -ne 0 ]; then
            echo "::group::Flux controller logs and events (reconcile failed)"
            echo "=== source-controller logs (flux-system) ==="
            kubectl logs -n flux-system -l app=source-controller --tail=300 --all-containers=true 2>/dev/null || true
            echo "=== helm-controller logs (flux-system) ==="
            kubectl logs -n flux-system -l app=helm-controller --tail=300 --all-containers=true 2>/dev/null || true
            echo "=== Events (flux-system) ==="
            kubectl get events -n flux-system --sort-by='.lastTimestamp' 2>/dev/null | tail -80 || true
            echo "=== Events (cronjob-log-monitor) ==="
            kubectl get events -n cronjob-log-monitor --sort-by='.lastTimestamp' 2>/dev/null | tail -80 || true
            echo "=== Flux get source oci ==="
            flux get source oci -n cronjob-log-monitor 2>/dev/null || true
            echo "=== Flux get helmrelease ==="
            flux get helmrelease -n cronjob-log-monitor 2>/dev/null || true
            echo "::endgroup::"
            exit 1
          fi

      # Deploy integration CronJob (sample app) to default namespace
      - name: Deploy integration CronJob to Kind
        run: |
          CRONJOB_IMAGE="${{ steps.artifacts.outputs.cronjob_image }}"
          for f in tests/integration/cronjob-app/k8s/cronjob.yaml tests/integration/cronjob-app/k8s/job.yaml; do
            sed "s|PLACEHOLDER_IMAGE|${CRONJOB_IMAGE}|g" "$f" | kubectl apply -f -
          done
          kubectl get cronjob,job,pods -n default -l integration=yes
          kubectl create job integration-run-once --from=cronjob/integration-cronjob || true

  # ── 5. Build release binary ────────────────────────────────────────────────
  build-release:
    name: Build Release
    needs: [integration-deploy]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: cronjob-log-monitor-binary
          path: target/release/cronjob-log-monitor

  # ── 6. Release notes (on tag: generate and publish to GitHub Release) ─────
  release-notes:
    name: Release Notes
    needs: [build-release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find Previous Tag
        id: prev_tag
        uses: octopilot/actions/previous-tag@main
        with:
          fallback: "v0.0.0"

      - name: Generate Release Notes
        id: release_notes
        uses: octopilot/actions/release@main
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          version: ${{ github.ref_name }}
          since_tag: ${{ steps.prev_tag.outputs.tag }}
          provider: anthropic

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: cronjob-log-monitor-binary

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: ${{ steps.release_notes.outputs.body_file }}
          files: cronjob-log-monitor-binary/cronjob-log-monitor

name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── 1. Auto-detect languages and versions from skaffold.yaml ───────────────
  detect:
    name: Detect Contexts
    runs-on: ubuntu-latest
    outputs:
      pipeline-context: ${{ steps.detect.outputs.pipeline-context }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect Contexts
        id: detect
        uses: octopilot/actions/detect-contexts@main

  # ── 2. Lint (pre-commit, language-aware) ───────────────────────────────────
  lint:
    needs: detect
    if: toJSON(fromJson(needs.detect.outputs.pipeline-context).languages) != '[]'
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: octopilot/actions/lint@main
        with:
          pipeline-context: ${{ needs.detect.outputs.pipeline-context }}

  # ── 3. Test (matrix per detected language context) ─────────────────────────
  # fail-fast: false so one failing context (e.g. Rust) does not cancel others
  # (Java, Helm). Integration runs only when all test matrix jobs pass.
  test:
    needs: detect
    if: toJSON(fromJson(needs.detect.outputs.pipeline-context).matrix) != '[]'
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.pipeline-context).matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: octopilot/actions/test@main
        with:
          pipeline-context: ${{ toJson(matrix) }}

  # ── 4a. Integration validate (build, smoke, generate UUID for artifacts) ───
  integration-validate:
    name: Integration (validate)
    needs: [lint, test]
    runs-on: ubuntu-latest
    outputs:
      uuid: ${{ steps.ttl.outputs.uuid }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo and rustup
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.rustup/
            target/
          key: ${{ runner.os }}-rust-stable-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-stable-cargo-test-
            ${{ runner.os }}-cargo-

      - name: Install mold linker
        run: sudo apt-get update -qq && sudo apt-get install -y mold

      - name: Build release binary
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/target
          CARGO_BUILD_INCREMENTAL: true
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
        run: cargo build --release

      - name: Smoke run (expect missing MONITOR_LABEL_SELECTOR)
        run: |
          set +e
          ./target/release/cronjob-log-monitor 2>&1 | tee /tmp/smoke-out
          code=${PIPESTATUS[0]}
          if [ "$code" -eq 0 ]; then echo "Expected binary to exit non-zero"; exit 1; fi
          grep -q "MONITOR_LABEL_SELECTOR" /tmp/smoke-out || { echo "Expected error message to mention MONITOR_LABEL_SELECTOR"; exit 1; }

      - name: Generate ttl.sh UUID
        id: ttl
        run: |
          TTL_UUID="$(uuidgen | tr -d '-' | tr '[:upper:]' '[:lower:]')"
          echo "uuid=${TTL_UUID}" >> "$GITHUB_OUTPUT"

  # ── 4b. Integration artifacts (matrix: image | sample | chart) ──────────────
  integration-artifacts:
    name: Integration (${{ matrix.artifact }})
    needs: integration-validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: image
          - artifact: sample
          - artifact: chart
    steps:
      - uses: actions/checkout@v4

      - name: Setup pack CLI (sample)
        if: matrix.artifact == 'sample'
        uses: buildpacks/github-actions/setup-pack@v5.1.0

      - name: Build and push monitor image to ttl.sh
        if: matrix.artifact == 'image'
        id: monitor-image
        env:
          DOCKER_BUILDKIT: 1
          CARGO_BUILD_INCREMENTAL: true
        uses: octopilot/actions/docker-to-ttl-sh@main
        with:
          ttl-uuid: ${{ needs.integration-validate.outputs.uuid }}
          suffix: monitor
          dockerfile: Dockerfile
          context: .

      - name: Build and push sample (cronjob) image to ttl.sh
        if: matrix.artifact == 'sample'
        id: cronjob-image
        uses: octopilot/actions/paketo-to-ttl-sh@main
        with:
          ttl-uuid: ${{ needs.integration-validate.outputs.uuid }}
          suffix: cronjob
          path: tests/integration/cronjob-app
          builder: paketobuildpacks/builder-jammy-base
          build-env: BP_JVM_VERSION=17

      - name: Write artifact outputs (image)
        if: matrix.artifact == 'image'
        run: echo "monitor_image=${{ steps.monitor-image.outputs.image }}" > outputs.txt

      - name: Write artifact outputs (sample)
        if: matrix.artifact == 'sample'
        run: echo "cronjob_image=${{ steps.cronjob-image.outputs.image }}" > outputs.txt

      - name: Package and push Helm chart
        if: matrix.artifact == 'chart'
        uses: octopilot/actions/helm-to-ttl-sh@main
        with:
          ttl-uuid: ${{ needs.integration-validate.outputs.uuid }}
          chart-path: chart
          output-path: outputs.txt

      - name: Upload artifact outputs
        run: |
          mkdir -p artifact-out
          mv outputs.txt "artifact-out/${{ matrix.artifact }}.txt" 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: integration-${{ matrix.artifact }}
          path: artifact-out/${{ matrix.artifact }}.txt
          retention-days: 1

  # ── 4c. Integration deploy (Kind + Helm + CronJob) ─────────────────────────
  integration-deploy:
    name: Integration (deploy)
    needs: integration-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact outputs
        uses: actions/download-artifact@v4
        with:
          pattern: integration-*
          path: artifact-outputs

      - name: Load artifact outputs
        id: artifacts
        run: |
          find artifact-outputs -name '*.txt' -exec cat {} \; 2>/dev/null | grep -E '^(monitor_image|cronjob_image|chart_ref|chart_version)=' | sort -u > env.txt
          echo "monitor_image=$(grep '^monitor_image=' env.txt | cut -d= -f2-)" >> "$GITHUB_OUTPUT"
          echo "cronjob_image=$(grep '^cronjob_image=' env.txt | cut -d= -f2-)" >> "$GITHUB_OUTPUT"
          echo "chart_ref=$(grep '^chart_ref=' env.txt | cut -d= -f2-)" >> "$GITHUB_OUTPUT"
          echo "chart_version=$(grep '^chart_version=' env.txt | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

      - name: Create Kind cluster (Kubernetes 1.34.3)
        uses: helm/kind-action@v1
        with:
          version: v0.31.0
          node_image: kindest/node:v1.34.3
          cluster_name: cronjob-log-monitor
          wait: 120s

      - name: Install Helm
        run: |
          curl -sSL "https://get.helm.sh/helm-v3.16.4-linux-amd64.tar.gz" | tar -xzf - -C /tmp
          sudo mv /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version --short

      - name: Deploy Helm chart to Kind (from OCI)
        run: |
          helm install cronjob-log-monitor \
            "${{ steps.artifacts.outputs.chart_ref }}" \
            --version "${{ steps.artifacts.outputs.chart_version }}" \
            --create-namespace \
            --namespace cronjob-log-monitor \
            --set watchNamespace=default \
            --set monitorLabelSelector=integration=yes \
            --set image=${{ steps.artifacts.outputs.monitor_image }} \
            --set imagePullPolicy=Always
          kubectl get all -n cronjob-log-monitor
          helm status cronjob-log-monitor -n cronjob-log-monitor

      - name: Deploy integration CronJob to Kind
        run: |
          CRONJOB_IMAGE="${{ steps.artifacts.outputs.cronjob_image }}"
          for f in tests/integration/cronjob-app/k8s/cronjob.yaml tests/integration/cronjob-app/k8s/job.yaml; do
            sed "s|PLACEHOLDER_IMAGE|${CRONJOB_IMAGE}|g" "$f" | kubectl apply -f -
          done
          kubectl get cronjob,job,pods -n default -l integration=yes
          kubectl create job integration-run-once --from=cronjob/integration-cronjob || true

  # ── 5. Build release binary ────────────────────────────────────────────────
  build-release:
    name: Build Release
    needs: [integration-deploy]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: cronjob-log-monitor-binary
          path: target/release/cronjob-log-monitor

  # ── 6. Release notes (on tag: generate and publish to GitHub Release) ─────
  release-notes:
    name: Release Notes
    needs: [build-release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find Previous Tag
        id: prev_tag
        uses: octopilot/actions/previous-tag@main
        with:
          fallback: "v0.0.0"

      - name: Generate Release Notes
        id: release_notes
        uses: octopilot/actions/release@main
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          version: ${{ github.ref_name }}
          since_tag: ${{ steps.prev_tag.outputs.tag }}
          provider: anthropic

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: cronjob-log-monitor-binary

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: ${{ steps.release_notes.outputs.body_file }}
          files: cronjob-log-monitor-binary/cronjob-log-monitor

name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── 1. Auto-detect languages and versions from skaffold.yaml ───────────────
  detect:
    name: Detect Contexts
    runs-on: ubuntu-latest
    outputs:
      pipeline-context: ${{ steps.detect.outputs.pipeline-context }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect Contexts
        id: detect
        uses: octopilot/actions/detect-contexts@main

  # ── 2. Lint (pre-commit, language-aware) ───────────────────────────────────
  lint:
    needs: detect
    if: toJSON(fromJson(needs.detect.outputs.pipeline-context).languages) != '[]'
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: octopilot/actions/lint@main
        with:
          pipeline-context: ${{ needs.detect.outputs.pipeline-context }}

  # ── 3. Test (matrix per detected language context) ─────────────────────────
  # fail-fast: false so one failing context (e.g. Rust) does not cancel others
  # (Java, Helm). Integration runs only when all test matrix jobs pass.
  test:
    needs: detect
    if: toJSON(fromJson(needs.detect.outputs.pipeline-context).matrix) != '[]'
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.pipeline-context).matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: octopilot/actions/test@main
        with:
          pipeline-context: ${{ toJson(matrix) }}

  # ── 4a. Integration validate (build, smoke, generate UUID; skaffold + detect) ─
  integration-validate:
    name: Integration (validate)
    needs: [detect, lint, test]
    runs-on: ubuntu-latest
    outputs:
      uuid: ${{ steps.validate.outputs.uuid }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate primary build and generate UUID
        id: validate
        uses: octopilot/actions/integration-validate@main
        with:
          pipeline-context: ${{ needs.detect.outputs.pipeline-context }}
          smoke-binary-path: target/release/cronjob-log-monitor
          smoke-expect-pattern: MONITOR_LABEL_SELECTOR

  # ── 4b. Integration artifacts (matrix from skaffold + chart_paths) ──────────
  # Matrix is derived from detect: skaffold build.artifacts (docker if Dockerfile in context, else pack) and chart_paths.
  integration-artifacts:
    name: Integration (${{ matrix.suffix || matrix.output_key }})
    needs: [detect, integration-validate]
    if: length(fromJson(needs.detect.outputs.pipeline-context).integration_matrix) > 0
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.pipeline-context).integration_matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pack CLI
        if: matrix.build_method == 'pack'
        uses: buildpacks/github-actions/setup-pack@v5.1.0

      - name: Build and push artifact
        id: build
        uses: octopilot/actions/integration-build-artifact@main
        with:
          artifact: ${{ toJson(matrix) }}
          ttl-uuid: ${{ needs.integration-validate.outputs.uuid }}

      - name: Upload artifact outputs
        run: |
          mkdir -p artifact-out
          mv outputs.txt "artifact-out/${{ matrix.output_key }}.txt" 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: integration-${{ matrix.output_key }}
          path: artifact-out/${{ matrix.output_key }}.txt
          retention-days: 1

  # ── 4c. Integration deploy (Kind + Helm + CronJob) ─────────────────────────
  integration-deploy:
    name: Integration (deploy)
    needs: integration-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact outputs
        uses: actions/download-artifact@v4
        with:
          pattern: integration-*
          path: artifact-outputs

      - name: Load artifact outputs
        id: artifacts
        run: |
          set -e
          # Collect key=value from integration artifact .txt files (detect uses generic keys: image_<suffix>, chart_ref, chart_version)
          env_txt=""
          while IFS= read -r f; do
            env_txt="${env_txt}$(cat "$f" 2>/dev/null)"
            env_txt="${env_txt}"$'\n'
          done < <(find artifact-outputs -type f -name '*.txt' 2>/dev/null | sort)
          echo "$env_txt" | grep -E '^(image_|chart_ref|chart_version)=' | sort -u > env.txt
          IMAGE_MONITOR="$(grep '^image_monitor=' env.txt | cut -d= -f2- | head -1)"
          IMAGE_CRONJOB="$(grep '^image_cronjob=' env.txt | cut -d= -f2- | head -1)"
          CHART_REF="$(grep '^chart_ref=' env.txt | cut -d= -f2- | head -1)"
          CHART_VERSION="$(grep '^chart_version=' env.txt | cut -d= -f2- | head -1)"
          # Map generic keys to this repo's deploy convention
          echo "monitor_image=${IMAGE_MONITOR}" >> "$GITHUB_OUTPUT"
          echo "cronjob_image=${IMAGE_CRONJOB}" >> "$GITHUB_OUTPUT"
          echo "chart_ref=${CHART_REF}" >> "$GITHUB_OUTPUT"
          echo "chart_version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"
          if [ -z "$IMAGE_MONITOR" ] || [ -z "$IMAGE_CRONJOB" ] || [ -z "$CHART_REF" ] || [ -z "$CHART_VERSION" ]; then
            echo "::error::Missing artifact outputs: image_monitor=${IMAGE_MONITOR:+set} image_cronjob=${IMAGE_CRONJOB:+set} chart_ref=${CHART_REF:+set} chart_version=${CHART_VERSION:+set}"
            echo "env.txt contents:"
            cat env.txt || true
            echo "artifact-outputs layout:"
            find artifact-outputs -type f 2>/dev/null || true
            exit 1
          fi

      - name: Create Kind cluster (Kubernetes 1.34.3)
        uses: helm/kind-action@v1
        with:
          version: v0.31.0
          node_image: kindest/node:v1.34.3
          cluster_name: cronjob-log-monitor
          wait: 120s

      - name: Install Helm
        run: |
          curl -sSL "https://get.helm.sh/helm-v3.16.4-linux-amd64.tar.gz" | tar -xzf - -C /tmp
          sudo mv /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version --short

      - name: Deploy Helm chart to Kind (from OCI)
        run: |
          helm install cronjob-log-monitor \
            "${{ steps.artifacts.outputs.chart_ref }}" \
            --version "${{ steps.artifacts.outputs.chart_version }}" \
            --create-namespace \
            --namespace cronjob-log-monitor \
            --set watchNamespace=default \
            --set monitorLabelSelector=integration=yes \
            --set image=${{ steps.artifacts.outputs.monitor_image }} \
            --set imagePullPolicy=Always
          kubectl get all -n cronjob-log-monitor
          helm status cronjob-log-monitor -n cronjob-log-monitor

      - name: Deploy integration CronJob to Kind
        run: |
          CRONJOB_IMAGE="${{ steps.artifacts.outputs.cronjob_image }}"
          for f in tests/integration/cronjob-app/k8s/cronjob.yaml tests/integration/cronjob-app/k8s/job.yaml; do
            sed "s|PLACEHOLDER_IMAGE|${CRONJOB_IMAGE}|g" "$f" | kubectl apply -f -
          done
          kubectl get cronjob,job,pods -n default -l integration=yes
          kubectl create job integration-run-once --from=cronjob/integration-cronjob || true

  # ── 5. Build release binary ────────────────────────────────────────────────
  build-release:
    name: Build Release
    needs: [integration-deploy]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: cronjob-log-monitor-binary
          path: target/release/cronjob-log-monitor

  # ── 6. Release notes (on tag: generate and publish to GitHub Release) ─────
  release-notes:
    name: Release Notes
    needs: [build-release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find Previous Tag
        id: prev_tag
        uses: octopilot/actions/previous-tag@main
        with:
          fallback: "v0.0.0"

      - name: Generate Release Notes
        id: release_notes
        uses: octopilot/actions/release@main
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          version: ${{ github.ref_name }}
          since_tag: ${{ steps.prev_tag.outputs.tag }}
          provider: anthropic

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: cronjob-log-monitor-binary

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: ${{ steps.release_notes.outputs.body_file }}
          files: cronjob-log-monitor-binary/cronjob-log-monitor

name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── 1. Auto-detect languages and versions from skaffold.yaml ───────────────
  detect:
    name: Detect Contexts
    runs-on: ubuntu-latest
    outputs:
      pipeline-context: ${{ steps.detect.outputs.pipeline-context }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect Contexts
        id: detect
        uses: octopilot/actions/detect-contexts@main

  # ── 2. Lint (pre-commit, language-aware) ───────────────────────────────────
  lint:
    needs: detect
    if: toJSON(fromJson(needs.detect.outputs.pipeline-context).languages) != '[]'
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: octopilot/actions/lint@main
        with:
          pipeline-context: ${{ needs.detect.outputs.pipeline-context }}

  # ── 3. Test (matrix per detected language context) ─────────────────────────
  # fail-fast: false so one failing context (e.g. Rust) does not cancel others
  # (Java, Helm). Integration runs only when all test matrix jobs pass.
  test:
    needs: detect
    if: toJSON(fromJson(needs.detect.outputs.pipeline-context).matrix) != '[]'
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.pipeline-context).matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: octopilot/actions/test@main
        with:
          pipeline-context: ${{ toJson(matrix) }}

  # ── 4. Integration (smoke: binary runs and fails fast without required env; Kind + Helm) ─
  integration:
    name: Integration
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo and rustup
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.rustup/
            target/
          key: ${{ runner.os }}-rust-stable-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-stable-cargo-test-
            ${{ runner.os }}-cargo-

      - name: Install mold linker
        run: sudo apt-get update -qq && sudo apt-get install -y mold

      - name: Build release binary
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/target
          CARGO_BUILD_INCREMENTAL: 1
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
        run: cargo build --release

      - name: Smoke run (expect missing MONITOR_LABEL_SELECTOR)
        run: |
          set +e
          out=$(./target/release/cronjob-log-monitor 2>&1)
          code=$?
          echo "$out"
          if [ $code -eq 0 ]; then exit 1; fi
          echo "$out" | grep -q "MONITOR_LABEL_SELECTOR" || exit 1

      - name: Create Kind cluster (Kubernetes 1.34.3)
        uses: helm/kind-action@v1
        with:
          version: v0.31.0
          node_image: kindest/node:v1.34.3
          cluster_name: cronjob-log-monitor
          wait: 120s

      - name: Install Helm
        run: |
          curl -sSL "https://get.helm.sh/helm-v3.16.4-linux-amd64.tar.gz" | tar -xzf - -C /tmp
          sudo mv /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version --short

      - name: Generate ttl.sh UUID
        id: ttl
        run: |
          TTL_UUID="$(uuidgen | tr -d '-' | tr '[:upper:]' '[:lower:]')"
          echo "uuid=${TTL_UUID}" >> "$GITHUB_OUTPUT"

      - name: Setup pack CLI
        uses: buildpacks/github-actions/setup-pack@v5.1.0

      - name: Build and push images to ttl.sh
        id: images
        env:
          TTL_UUID: ${{ steps.ttl.outputs.uuid }}
          DOCKER_BUILDKIT: 1
        run: |
          MONITOR_IMAGE="ttl.sh/${TTL_UUID}-monitor:1h"
          CRONJOB_IMAGE="ttl.sh/${TTL_UUID}-cronjob:1h"
          docker build -t "$MONITOR_IMAGE" -f Dockerfile . \
            --build-arg CARGO_CACHE_SOURCE="$HOME/.cargo" \
            --build-arg RUSTUP_CACHE_SOURCE="$HOME/.rustup" \
            --build-arg TARGET_CACHE_SOURCE="${{ github.workspace }}/target"
          pack build "$CRONJOB_IMAGE" \
            --builder paketobuildpacks/builder-jammy-base \
            --path tests/integration/cronjob-app \
            --env BP_JVM_VERSION=17
          docker push "$MONITOR_IMAGE"
          docker push "$CRONJOB_IMAGE"
          echo "monitor_image=$MONITOR_IMAGE" >> "$GITHUB_OUTPUT"
          echo "cronjob_image=$CRONJOB_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Package and push Helm chart to ttl.sh (OCI)
        id: chart
        env:
          TTL_UUID: ${{ steps.ttl.outputs.uuid }}
        run: |
          CHART_OCI_NAME="${TTL_UUID}"
          mkdir -p /tmp/chart-out
          cd chart
          helm dependency build .
          helm package . -d /tmp/chart-out
          CHART_TGZ="$(ls /tmp/chart-out/cronjob-log-monitor-*.tgz)"
          helm push "$CHART_TGZ" "oci://ttl.sh/${CHART_OCI_NAME}"
          CHART_VERSION="$(helm show chart "$CHART_TGZ" | grep '^version:' | awk '{print $2}')"
          echo "chart_ref=oci://ttl.sh/${CHART_OCI_NAME}" >> "$GITHUB_OUTPUT"
          echo "chart_version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Deploy Helm chart to Kind (from OCI)
        run: |
          helm install cronjob-log-monitor \
            "${{ steps.chart.outputs.chart_ref }}" \
            --version "${{ steps.chart.outputs.chart_version }}" \
            --create-namespace \
            --namespace cronjob-log-monitor \
            --set watchNamespace=default \
            --set monitorLabelSelector=integration=yes \
            --set image=${{ steps.images.outputs.monitor_image }} \
            --set imagePullPolicy=Always
          kubectl get all -n cronjob-log-monitor
          helm status cronjob-log-monitor -n cronjob-log-monitor

      - name: Deploy integration CronJob to Kind
        run: |
          CRONJOB_IMAGE="${{ steps.images.outputs.cronjob_image }}"
          for f in tests/integration/cronjob-app/k8s/cronjob.yaml tests/integration/cronjob-app/k8s/job.yaml; do
            sed "s|PLACEHOLDER_IMAGE|${CRONJOB_IMAGE}|g" "$f" | kubectl apply -f -
          done
          kubectl get cronjob,job,pods -n default -l integration=yes
          kubectl create job integration-run-once --from=cronjob/integration-cronjob || true

  # ── 5. Build release binary ────────────────────────────────────────────────
  build-release:
    name: Build Release
    needs: [integration]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: cronjob-log-monitor-binary
          path: target/release/cronjob-log-monitor

  # ── 6. Release notes (on tag: generate and publish to GitHub Release) ─────
  release-notes:
    name: Release Notes
    needs: [build-release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find Previous Tag
        id: prev_tag
        uses: octopilot/actions/previous-tag@main
        with:
          fallback: "v0.0.0"

      - name: Generate Release Notes
        id: release_notes
        uses: octopilot/actions/release@main
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          version: ${{ github.ref_name }}
          since_tag: ${{ steps.prev_tag.outputs.tag }}
          provider: anthropic

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: cronjob-log-monitor-binary

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: ${{ steps.release_notes.outputs.body_file }}
          files: cronjob-log-monitor-binary/cronjob-log-monitor

# builder-jammy-base tag must exist on GHCR; use a version tag for CI (e.g. 0.1.198).
# See buildpacks/builder-jammy-base and .cursor/rules/op-buildpacks-builder.mdc.
apiVersion: skaffold/v4beta7
kind: Config
metadata:
  name: cronjob-log-monitor
build:
  artifacts:
    - image: ghcr.io/octopilot/cronjob-log-monitor
      context: .
      buildpacks:
        builder: ghcr.io/octopilot/builder-jammy-base:0.1.198
    - image: ghcr.io/octopilot/cronjob-log-monitor-chart
      context: chart/chartTemplate
      buildpacks:
        builder: ghcr.io/octopilot/builder-jammy-base:0.1.198
    - image: ghcr.io/octopilot/cronjob-log-monitor-integration-cronjob
      context: tests/integration/cronjob-app
      buildpacks:
        builder: ghcr.io/octopilot/builder-jammy-base:0.1.198
        env:
          - BP_JVM_VERSION=21

# OCI chart source for cronjob-log-monitor. CHART_OCI_URL and ref are substituted by CI/Tilt.
# CI: CHART_OCI_URL + CHART_DIGEST from build_result.json.
# Tilt: flux_deploy.py sets CHART_OCI_URL=registry-tls:5000/... and CHART_REF_BLOCK (digest or tag).
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cronjob-log-monitor-chart
  namespace: cronjob-log-monitor
spec:
  interval: 5m
  url: oci://${CHART_OCI_URL}
  ref:
    ${CHART_REF_BLOCK}
  # Allow HTTP for local registry (registry-tls:5000). Omit or set false for CI (ttl.sh/GHCR use HTTPS).
  insecure: true

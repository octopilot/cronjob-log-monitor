# Kind overlay: local registry (insecure: true), imagePullPolicy, etc.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../deployment
patches:
  # Allow HTTP for local registry (registry-tls:5000)
  - target:
      kind: OCIRepository
      name: cronjob-log-monitor-chart
    patch: |
      - op: replace
        path: /spec/insecure
        value: true
  # Ensure imagePullPolicy is Always for ephemeral ttl.sh images on Kind
  - target:
      kind: HelmRelease
      name: cronjob-log-monitor
    patch: |
      - op: replace
        path: /spec/values/imagePullPolicy
        value: Always

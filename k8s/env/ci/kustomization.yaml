# CI overlay: ttl.sh/GHCR, HTTPS (insecure: false).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../deployment
patches:
  - target:
      kind: OCIRepository
      name: cronjob-log-monitor-chart
    patch: |
      - op: replace
        path: /spec/insecure
        value: false

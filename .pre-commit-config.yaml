# Install hooks: just install-hooks   (or: pre-commit install)
# Run manually: just pre-commit      (or: pre-commit run --all-files)
# Pre-commit blocks commits that are unformatted or fail clippy.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: ['--fix', 'lf']
      - id: check-yaml
      - id: check-toml

  - repo: local
    hooks:
      - id: cargo-fmt-check
        name: cargo fmt (check)
        description: Fail if Rust code is not formatted
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        description: Fail if Rust code has lint errors
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

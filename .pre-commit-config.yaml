# Install hooks: just install-hooks   (or: pre-commit install)
# Run manually: just pre-commit      (or: pre-commit run --all-files)
# Pre-commit blocks commits that are unformatted or fail clippy.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: ['--fix', 'lf']
      - id: check-yaml
        # Helm chart templates use {{ .Values }} etc.; use helm lint instead.
        exclude: '^chart/chartTemplate/|^k8s/'
      - id: check-toml

  - repo: local
    hooks:
      - id: helm-lint
        name: helm lint
        description: Lint Helm chart (use helm lint instead of check-yaml for templates)
        entry: bash -c 'for d in chart/chartTemplate; do [ -f "$d/Chart.yaml" ] && (cd "$d" && helm dependency build . 2>/dev/null; helm lint .); done'
        language: system
        files: '^chart/chartTemplate/'

      - id: cargo-fmt-check
        name: cargo fmt (check)
        description: Fail if Rust code is not formatted
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        description: Fail if Rust code has lint errors
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

apiVersion: v1
kind: Service
metadata:
  name: {{ include "cronjob-log-monitor.fullname" . }}
  labels:
    {{- include "cronjob-log-monitor.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.healthPort }}
      targetPort: health
      protocol: TCP
      name: health
  selector:
    {{- include "cronjob-log-monitor.selectorLabels" . | nindent 4 }}
